{% extends "base.html" %}
{% block title %}Login — Khata Pro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-journal-bookmark-fill display-3 text-primary"></i>
                    <h2 class="mt-2 fw-bold">Khata Pro</h2>
                    <p class="text-muted">Credit-Debit Management System</p>
                </div>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    New here? <a href="{{ url_for('auth.register') }}">Register your shop</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
