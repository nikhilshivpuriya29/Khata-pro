{% extends "base.html" %}
{% block title %}{{ t('edit_account') }} — {{ t('app_name') }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-3 p-md-4">
                <h4 class="fw-bold mb-4"><i class="bi bi-person-gear me-2"></i>{{ t('edit_account') }}</h4>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label">{{ t('shop_name') }}</label>
                            <input type="text" name="shop_name" class="form-control" value="{{ current_user.shop_name }}" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">{{ t('owner_name') }}</label>
                            <input type="text" name="owner_name" class="form-control" value="{{ current_user.owner_name }}" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">{{ t('phone') }}</label>
                            <input type="tel" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">{{ t('shop_address') }}</label>
                            <textarea name="address" class="form-control" rows="2">{{ current_user.address or '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">{{ t('new_password') }}</label>
                            <input type="password" name="new_password" class="form-control" placeholder="{{ t('leave_blank') }}" minlength="4">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1"><i class="bi bi-check-lg me-1"></i>{{ t('update') }}</button>
                        <a href="{{ url_for('main.account') }}" class="btn btn-outline-secondary btn-lg">{{ t('cancel') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
